# LSTM非決定性の切り分け用（原因特定後に削除する）
name: Diag Determinism

on:
  push:
    paths:
      - '.github/workflows/diag-determinism.yml'
      - 'scripts/_diag_determinism.py'

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -r scripts/requirements.txt

      - name: 環境
        working-directory: scripts
        run: python _diag_determinism.py env

      - name: 同一プロセス内で2回
        working-directory: scripts
        run: python _diag_determinism.py inproc

      - name: 別プロセスで2回（現状の設定）
        working-directory: scripts
        run: |
          python _diag_determinism.py once > /tmp/a.json
          python _diag_determinism.py once > /tmp/b.json
          cmp -s /tmp/a.json /tmp/b.json && echo "別プロセス: 一致" || echo "別プロセス: 不一致"

      - name: 別プロセスで2回（OMP/MKL を1に固定）
        working-directory: scripts
        env:
          OMP_NUM_THREADS: '1'
          MKL_NUM_THREADS: '1'
        run: |
          python _diag_determinism.py once > /tmp/c.json
          python _diag_determinism.py once > /tmp/d.json
          cmp -s /tmp/c.json /tmp/d.json && echo "OMP固定: 一致" || echo "OMP固定: 不一致"

      - name: 指紋（CPU + LSTM出力ハッシュ）
        working-directory: scripts
        run: python _diag_determinism.py fingerprint

      - name: RF→LSTM 順序を再現して別プロセス2回（現状）
        working-directory: scripts
        run: |
          python _diag_determinism.py rfthen | tee /tmp/p1.txt
          python _diag_determinism.py rfthen | tee /tmp/p2.txt
          cmp -s /tmp/p1.txt /tmp/p2.txt && echo "RF→LSTM 現状: 一致" || echo "RF→LSTM 現状: 不一致"

      - name: RF→LSTM 順序で OMP/MKL を1に固定して別プロセス2回
        working-directory: scripts
        env:
          OMP_NUM_THREADS: '1'
          MKL_NUM_THREADS: '1'
        run: |
          python _diag_determinism.py rfthen | tee /tmp/q1.txt
          python _diag_determinism.py rfthen | tee /tmp/q2.txt
          cmp -s /tmp/q1.txt /tmp/q2.txt && echo "RF→LSTM OMP固定: 一致" || echo "RF→LSTM OMP固定: 不一致"

      - name: 参考 — 別プロセス実行同士の突き合わせ
        run: |
          cmp -s /tmp/a.json /tmp/c.json \
            && echo "現状設定 と OMP固定 の結果は同一" \
            || echo "現状設定 と OMP固定 で結果が異なる"
